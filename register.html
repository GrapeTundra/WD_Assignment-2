<body id="regBody">

      <!--main body of the page-->
      <main id="RegFormPage" class="FormPageMain">
            <!--Title and page information-->
            <h2>Registration</h2>
            <p>Wanna help us review websites, or get notified when we update our reviews? Register for an account with ORCA:</p>

            <!--Form-->
            <form id="regform" method="post"
		action="http://mercury.swin.edu.au/it000000/cos10005/regtest.php">

                  <!--User name input-->
			<div class="textinput">
				<label for="UnameIn">Username</label>
				<input id="UnameIn" type="text" name="Uname" >
			</div>

                   <!--Email input-->
                  <div class="textinput">
				<label for="EmailIn">Email</label>
				<input id="EmailIn" type="text" name="Email" >
			</div>

                   <!--Phone number input-->
                  <div class="numinput">
				<label for="PhoneNumIn">Phone number</label>
				<input id="PhoneNumIn" type="number" name="PhoneNum" >
			</div>

                   <!--Password and confirm password-->
			<div class="textinput">
				<label for="pwd1">Password</label>
				<input id="pwd1" type="password" name="pwd1" >
			</div>

			<div class="textinput">
				<label for="pwd2">Retype Password</label>
				<input id="pwd2" type="password" name="pwd2" >
			</div>
		
                   <!--Gender-->
			<div class="radioinput">
				<span class="radiolabel">Gender</span>

				<input id="genm" type="radio" name="gender" value="M" >
				<label for="genm">Male</label>

				<input id="genf" type="radio" name="gender" value="F" >
				<label for="genf">Female</label>

                        <input id="geno" type="radio" name="gender" value="O" >
				<label for="geno">Other</label>
			</div>

                  <!--Diatry Preferences-->
                  
                  <div class="checkboxInput">
                        <span class="checkLabel">Dietary preferences</span>

                        <input type="checkbox" id="Veg" name="DiatryPref" value="Vegan">
                        <label for="Veg">Vegan</label>

                        <input type="checkbox" id="Vege" name="DiatryPref" value="Vegetarian">
                        <label for="Vege">Vegetarian</label>

                        <input type="checkbox" id="Hal" name="DiatryPref" value="Halal">
                        <label for="Hal">Halal</label>

                        <input type="checkbox" id="Non" name="DiatryPref" value="None">
                        <label for="Non">None</label>
                  </div>

		      <!--Country/Region-->
                  <div class="textinput">
				<label for="LocationIn">Country/Region</label>
				<input id="LocationIn" type="text" name="Location" >
			</div>


		<div class="buttoninput">
			<input type="submit" value="Register" >
		</div>
	</form>

      </main>

</body>
